Categories:
  - Sports & Health
License: GPL-3.0-or-later
AuthorName: Steve Maegley
SourceCode: https://github.com/smaegley/megrim
IssueTracker: https://github.com/smaegley/megrim/issues
Changelog: https://github.com/smaegley/megrim/releases
Donate: https://ko-fi.com/smaegley

RepoType: git
Repo: https://github.com/smaegley/megrim.git

Builds:
  - versionName: 1.0.0
    versionCode: 5
    commit: cda553a05a3c33e8d43d43820c64f6919bfcc189
    subdir: app
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" ../.github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - app/.pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[\d.]+$
UpdateCheckData: app/pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.0
CurrentVersionCode: 5
