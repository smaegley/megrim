name: Release

# Tag a release (e.g. v1.0.0) to build a signed APK and attach it to a GitHub Release.
# Requires these repository secrets (SPEC §8):
#   KEYSTORE_BASE64   - base64 of the release keystore (.jks)
#   KEYSTORE_PASSWORD - store password
#   KEY_ALIAS         - key alias
#   KEY_PASSWORD      - key password
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-signed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore and write signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/megrim-release.jks
          cat > android/key.properties <<EOF
          storeFile=$(pwd)/android/megrim-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - name: Attach artifacts to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab

      - name: Clean up signing material
        if: always()
        run: rm -f android/megrim-release.jks android/key.properties
